project:
  name: ""
  description: ""

maestro:
  version: "2.0.0"
  created: ""
  project_root: ""

agents:
  orchestrator:
    id: "orchestrator"
    model: "opus"
  planner:
    id: "planner"
    model: "opus"
  workers:
    count: 4
    default_model: "sonnet"
    models:
      worker3: "opus"
      worker4: "opus"
    boost: false

continuous:
  enabled: false
  max_iterations: 10
  pause_on_failure: true

watcher:
  debounce_sec: 0.3
  scan_interval_sec: 60
  dispatch_lease_sec: 300
  max_in_progress_min: 30
  busy_check_interval: 2
  busy_check_max_retries: 30
  busy_patterns: "Working|Thinking|Planning|Sending|Searching"
  idle_stable_sec: 5
  cooldown_after_clear: 3
  notify_lease_sec: 120

retry:
  command_dispatch: 5
  task_dispatch: 5
  orchestrator_notification_dispatch: 10
  task_execution:
    enabled: true
    retryable_exit_codes: [1, 124, 137]  # general error, timeout, killed
    max_retries: 2
    cooldown_sec: 30

queue:
  priority_aging_sec: 300

limits:
  max_pending_commands: 20
  max_pending_tasks_per_worker: 10
  max_entry_content_bytes: 65536
  max_yaml_file_bytes: 5242880

daemon:
  shutdown_timeout_sec: 90

logging:
  level: "info"

circuit_breaker:
  enabled: false                   # サーキットブレーカーの有効化フラグ (opt-in)
  max_consecutive_failures: 3      # 連続失敗でトリップするしきい値
  progress_timeout_minutes: 30     # 最後の成功からのタイムアウト (分、0で無効)

learnings:
  enabled: false                    # 学習知見の蓄積 (opt-in)
  max_entries: 100                  # 蓄積上限件数
  max_content_length: 500           # 1件あたりの最大文字数
  inject_count: 5                   # タスク配信時に注入する最新 K 件
  ttl_hours: 72                     # 学習知見の有効期限 (時間、0で無制限)

verification:
  enabled: false                    # 検証コマンド実行の有効化フラグ (opt-in)
  basic_command: ""                 # 基本検証コマンド (例: "go vet ./...")
  full_command: ""                  # 完全検証コマンド (例: "go test ./...")
  timeout_seconds: 300              # 検証コマンドのタイムアウト (秒)
  max_retries: 1                    # フレークテスト対策リトライ回数 (0=リトライなし)

worktree:
  enabled: false                    # Worker worktree 隔離の有効化フラグ (opt-in)
  base_branch: "main"              # worktree のベースブランチ
  path_prefix: ".maestro/worktrees" # worktree 作成先ディレクトリ
  auto_commit: true                # Phase 完了時の自動コミット
  auto_merge: true                 # Phase 境界での自動マージ
  merge_strategy: "ort"            # git merge 戦略
  cleanup_on_success: true         # コマンド成功時の自動クリーンアップ
  cleanup_on_failure: false        # コマンド失敗時のクリーンアップ (デフォルト: 保全)
  gc:
    enabled: true                  # 定期 GC の有効化
    ttl_hours: 24                  # 古い worktree の TTL (時間)
    max_worktrees: 32              # 最大 worktree 数

quality_gates:
  enabled: false                    # 品質ゲートの有効化フラグ
  skip_gates: false                 # 緊急モード (--skip-gates フラグで有効化)
  thresholds:
    max_task_failure_rate: 0.3     # タスク失敗率の上限 (30%)
    min_task_success_rate: 0.7     # タスク成功率の下限 (70%)
    max_consecutive_failures: 3    # 連続失敗の上限
    max_task_duration_sec: 300     # タスク実行時間の上限 (5分)
    max_pending_tasks: 50          # ペンディングタスクの上限
  enforcement:
    pre_task_check: true           # タスク実行前のチェック
    post_task_check: false         # タスク実行後のチェック
    failure_action: "warn"         # 失敗時の動作: "warn" or "block"
    log_violations: true           # 違反をログに記録
