# =============================================================================
# Maestro Configuration — Full Schema Reference
# =============================================================================
# 各設定項目の上に以下の情報をコメントで記載:
#   説明 / type: 型 | default: デフォルト値 | range: 有効範囲
# デフォルト値は config.go の DefaultXxx 定数に基づく。
# 有効範囲は config.go の Validate() に基づく。
# =============================================================================
# Environment-variable overrides (intentionally NOT in config.yaml):
#   MAESTRO_BLOCKED_PANE_FAIL_AFTER_SEC
#     Threshold (seconds) before the daemon force-fails a task whose worker
#     pane has been wedged on a confirmation/approval prompt. Default 180s
#     (3 min). Set to 0 to disable the early-fail behaviour and fall back to
#     the lease-extend-until-progress_timeout path.
#   MAESTRO_LOG_PANE_TAIL
#     "1" to include pane-tail snippets in clear_confirm / blocked-pane
#     diagnostic logs. Off by default for privacy: pane content can carry
#     sensitive operator data.
#   MAESTRO_AGENT_TMPDIR_OVERRIDE
#     "0" to skip the default <maestroDir>/cache/tmp TMPDIR override when
#     launching agents. Off by default — the override is required for
#     macOS sandbox compatibility (mktemp under inherited TMPDIR fails).
#   MAESTRO_LOCKORDER
#     Lock-order checker mode for race debugging ("off"/"warn"/"panic").
#     Default "off" — only useful during invariant investigations.
# =============================================================================

# --- Project ---
# プロジェクトの識別情報。
project:
  # name: プロジェクト名
  # type: string | default: なし (必須) | range: 空文字列不可
  name: ""
  # description: プロジェクトの説明
  # type: string | default: "" | range: 制限なし
  description: ""

# --- Maestro ---
# Daemon バージョンとワークスペースメタデータ。
maestro:
  # version: Maestro のバージョン
  # type: string | default: なし (必須) | range: 空文字列不可
  version: "2.0.0"
  # created: 初期化日時
  # type: string | default: "" | range: 制限なし
  created: ""
  # project_root: プロジェクトルートのパス
  # type: string | default: "" | range: 制限なし
  project_root: ""
  # awaiting_fill_stall_notify_minutes: awaiting_fill 状態に陥った Phase に対して、
  # daemon が watchdog 用 `awaiting_fill_stall` シグナルを Planner に再投入するまでの分数。
  # 元々の `awaiting_fill` シグナルは Phase 入場時に一度だけ送られるため、Planner pane が
  # 配信後に Thinking のまま停止すると次の再プロンプトは R6 の fill_deadline_at (デフォルト
  # 3 時間) まで発生しない。Watchdog はその空白を埋めるための短期タイマー。
  # 0 を設定すると watchdog を無効化（R6 のみで運用）。
  # type: int | default: 5 | range: 0-(無効) または正の分数
  awaiting_fill_stall_notify_minutes: 5

# --- Agents ---
# Agent ロールごとの設定。
agents:
  orchestrator:
    # id: Orchestrator Agent の識別子
    # type: string | default: なし | range: 制限なし
    id: "orchestrator"
    # model: 使用するモデル名
    # type: string | default: なし | range: 制限なし
    model: "claude-opus-4-8[1m]"
    # base_prompt_mode: システムプロンプトの適用方法
    # type: string | default: "append" | range: "replace" or "append"
    base_prompt_mode: "replace"
  planner:
    # id: Planner Agent の識別子
    # type: string | default: なし | range: 制限なし
    id: "planner"
    # model: 使用するモデル名
    # type: string | default: なし | range: 制限なし
    model: "claude-opus-4-8[1m]"
    # base_prompt_mode: システムプロンプトの適用方法
    # type: string | default: "append" | range: "replace" or "append"
    base_prompt_mode: "replace"
  workers:
    # count: Worker Agent の数
    # type: int | default: なし | range: 1-8 (MinWorkers-MaxWorkers)
    count: 4
    # default_model: Worker のデフォルトモデル名
    # type: string | default: なし | range: 制限なし
    default_model: "claude-sonnet-5[1m]"
    # base_prompt_mode: システムプロンプトの適用方法
    # type: string | default: "append" | range: "replace" or "append"
    base_prompt_mode: "append"
    # models: Worker ごとのモデルオーバーライド (worker_id -> model_name)
    # type: map[string]string | default: なし | range: 制限なし
    models:
      worker1: "claude-sonnet-5[1m]"
      worker2: "claude-sonnet-5[1m]"
      worker3: "claude-opus-4-8[1m]"
      worker4: "claude-opus-4-8[1m]"
    # boost: Worker のブーストモード有効化
    # type: bool | default: false | range: true/false
    boost: false
    # capabilities: Worker ごとの capability タグ (worker_id -> tags)。
    # type: map[string][]string | default: runtime 既定
    # タスクの required_capabilities / preferred_capabilities とのマッチングに使用 (完全一致)。
    # 省略した worker は runtime 既定の capability を宣言する:
    #   claude-code: code_quality, design_review, instruction_following, run_on_main
    #   codex:       bulk_implementation, long_horizon_autonomy, refactor
    #   gemini:      multimodal, long_context_ingest, research, cost_efficient
    # 明示すると既定を上書きする (空リスト [] は「capability 無し」の宣言)。
    # capabilities:
    #   worker1: ["code_quality", "design_review", "instruction_following", "run_on_main"]
    #   worker2: ["bulk_implementation", "long_horizon_autonomy", "refactor"]
    #   worker3: ["multimodal", "long_context_ingest", "research", "cost_efficient"]

# --- Continuous ---
# 連続モードの設定。
continuous:
  # enabled: 連続モードの有効化フラグ
  # type: bool | default: false | range: true/false
  enabled: false
  # max_iterations: 最大イテレーション回数 (0=無制限)
  # type: int | default: 0 | range: >= 0 (enabled 時)
  max_iterations: 10
  # pause_on_failure: 失敗時に一時停止するか
  # type: bool | default: false | range: true/false
  pause_on_failure: true
  # max_consecutive_failures: 連続失敗でモード停止するしきい値 (0=無効)
  # Pre-generation gate: pause_on_failure とは独立。
  # 既存 config (このキー追加前) は 0 (無効) にデシリアライズされる。
  # type: int | default: 0 | range: >= 0 (enabled 時)
  max_consecutive_failures: 3
  # stall_notification_sec: continuous stall watchdog のしきい値（秒）。
  # running のまま、最後の iteration の結果処理後にこの秒数を超えて
  # 次の command が投入されない（かつキューに未終了 command が無い）場合、
  # daemon が continuous_stalled 通知を Orchestrator に送る。
  # Orchestrator が command_completed 通知を取り逃した際の無音停止対策。
  # type: int | default: 600 (0=デフォルト適用) | range: 負値で watchdog 無効
  stall_notification_sec: 600

# --- Watcher ---
# タスクディスパッチ Watcher のタイミング・ポーリング設定。
watcher:
  # debounce_sec: ファイル変更検知のデバウンス間隔 (秒)
  # type: float64 | default: 0 | range: >= 0
  debounce_sec: 0.5
  # scan_interval_sec: キュースキャンの間隔 (秒)
  # type: int | default: 0 | range: >= 0
  scan_interval_sec: 60
  # dispatch_lease_sec: ディスパッチリースの有効期間 (秒)
  # type: int | default: 0 | range: 0-3600 (MaxDispatchLeaseSec)
  # 2026-04-29 リファクタ: lease 期限切れ時に daemon は worker pane の
  # 内容ハッシュを scan 跨ぎで観測し、変化があれば lease を自動延長する
  # (busy_patterns マッチでも延長)。よってこの値は「pane が完全に静止
  # してから諦めるまでの猶予時間」であり、タスク本体の実行時間とは
  # 無関係になっている。デフォルト 5 分 (300) で十分。長時間実行は
  # max_in_progress_min をハードキャップとして使い分ける。
  dispatch_lease_sec: 300
  # max_in_progress_min: タスク in_progress 状態の最大持続時間 (分)
  # type: *int | default: 60 (DefaultMaxInProgressMin) | range: 0-1440 (MaxMaxInProgressMin)
  max_in_progress_min: 30
  # busy_check_interval: Agent ビジー状態チェックの間隔 (秒)
  # type: int | default: 0 | range: >= 0
  busy_check_interval: 2
  # busy_check_max_retries: Agent ビジーチェックの最大リトライ回数
  # type: int | default: 0 | range: 0-1000 (MaxBusyCheckMaxRetries)
  busy_check_max_retries: 30
  # busy_patterns: Agent がビジー状態かを判定する正規表現パターン ("|" 区切り)
  # type: string | default: "" | range: 制限なし
  busy_patterns: "Working|Thinking|Planning|Sending|Searching"
  # idle_stable_sec: Agent アイドル安定判定の持続時間 (秒)
  # type: int | default: 0 | range: >= 0
  idle_stable_sec: 5
  # cooldown_after_clear: /clear 後のクールダウン時間 (秒)
  # type: int | default: 0 | range: >= 0
  cooldown_after_clear: 3
  # notify_lease_sec: Orchestrator 通知リースの有効期間 (秒)
  # type: int | default: 0 | range: >= 0
  notify_lease_sec: 120
  # wait_ready_interval_sec: Agent 準備完了待ちのポーリング間隔 (秒)
  # type: int | default: 0 | range: >= 0
  wait_ready_interval_sec: 2
  # wait_ready_max_retries: Agent 準備完了待ちの最大リトライ回数
  # type: int | default: 0 | range: 0-1000 (MaxWaitReadyMaxRetries)
  wait_ready_max_retries: 15
  # clear_confirm_timeout_sec: クリア確認の1回あたりタイムアウト (秒)
  # type: int | default: 0 | range: >= 0
  # 8s は Claude Code TUI の起動初期遅延 (~3-5s) を吸収できる値。短すぎると
  # dispatch_task_failed clear_confirm が頻発し dispatch latency が積み重なる。
  clear_confirm_timeout_sec: 8
  # clear_confirm_poll_ms: クリア確認ウィンドウ内のポーリング間隔 (ms)
  # type: int | default: 0 | range: >= 0
  clear_confirm_poll_ms: 250
  # clear_max_attempts: クリア送信の最大試行回数 (初回含む)
  # type: int | default: 0 | range: >= 0
  # 7 × 8s = 56s 予算で Claude Code TUI の cold-start (~40-50s) を吸収する。
  # 5 attempts は workspace bench で transient miss が再発したため拡張
  # (Report 2026-05-06 第 3 回 P2)。
  clear_max_attempts: 7
  # clear_retry_backoff_ms: クリアリトライ間のベースバックオフ (ms、リトライ毎に倍増)
  # type: int | default: 0 | range: >= 0
  clear_retry_backoff_ms: 500
  # shell_ready_timeout_sec: Agent シェル準備完了のタイムアウト (秒、0=デフォルト10秒)
  # type: int | default: 10 (defaultShellReadyTimeoutSec) | range: >= 0
  shell_ready_timeout_sec: 10

# --- Retry ---
# ディスパッチ・実行リトライの設定。
retry:
  # command_dispatch: コマンドディスパッチのリトライ回数
  # type: int | default: 0 | range: >= 0
  command_dispatch: 5
  # task_dispatch: タスクディスパッチのリトライ回数
  # type: int | default: 0 | range: >= 0
  task_dispatch: 5
  # orchestrator_notification_dispatch: Orchestrator 通知ディスパッチのリトライ回数
  # type: int | default: 0 | range: >= 0
  orchestrator_notification_dispatch: 10
  # signal_dispatch: Planner signal 配送のリトライ回数（0 = 無制限）
  # Planner busy 時の exponential backoff 付きリトライ上限。
  # 超過すると signal は dead letter 化されキューから除去される。
  # type: int | default: 0 | range: >= 0
  signal_dispatch: 10
  # signal_inline_retries: Signal 配送のインラインリトライ回数
  # type: int | default: 2 (DefaultSignalInlineRetries) | range: >= 0
  signal_inline_retries: 2
  # signal_inline_retry_delay_sec: Signal インラインリトライの遅延 (秒)
  # type: int | default: 3 (DefaultSignalInlineRetryDelaySec) | range: >= 0
  signal_inline_retry_delay_sec: 3
  # signal_delivery_timeout_sec: Signal 配送のタイムアウト (秒)
  # type: int | default: 15 (DefaultSignalDeliveryTimeoutSec) | range: >= 0
  signal_delivery_timeout_sec: 15
  # result_notify_inline_retries: 結果通知のインラインリトライ回数
  # type: int | default: 2 (DefaultResultNotifyInlineRetries) | range: >= 0
  result_notify_inline_retries: 2
  # result_notify_inline_retry_delay_sec: 結果通知インラインリトライの遅延 (秒)
  # type: int | default: 3 (DefaultResultNotifyInlineRetryDelaySec) | range: >= 0
  result_notify_inline_retry_delay_sec: 3
  # result_notify_delivery_timeout_sec: 結果通知配送のタイムアウト (秒)
  # type: int | default: 15 (DefaultResultNotifyDeliveryTimeoutSec) | range: >= 0
  result_notify_delivery_timeout_sec: 15
  # command_dispatch_inline_retries: コマンドディスパッチのインラインリトライ回数
  # type: int | default: 2 (DefaultCommandDispatchInlineRetries) | range: >= 0
  command_dispatch_inline_retries: 2
  # command_dispatch_inline_retry_delay_sec: コマンドディスパッチインラインリトライの遅延 (秒)
  # type: int | default: 2 (DefaultCommandDispatchInlineRetryDelaySec) | range: >= 0
  command_dispatch_inline_retry_delay_sec: 2
  # task_dispatch_inline_retries: タスクディスパッチのインラインリトライ回数
  # type: int | default: 5 (DefaultTaskDispatchInlineRetries) | range: >= 0
  task_dispatch_inline_retries: 5
  # task_dispatch_inline_retry_delay_sec: タスクディスパッチインラインリトライの遅延 (秒)
  # type: int | default: 1 (DefaultTaskDispatchInlineRetryDelaySec) | range: >= 0
  task_dispatch_inline_retry_delay_sec: 1
  task_execution:
    # enabled: タスク実行の自動リトライの有効化フラグ
    # type: bool | default: true in generated config | range: true/false
    enabled: true
    # retryable_exit_codes: リトライ対象の終了コード一覧
    # type: []int | default: [] | range: 制限なし
    retryable_exit_codes: [1, 124, 137] # general error, timeout, killed
    # max_retries: 最大リトライ回数
    # type: int | default: 0 | range: >= 0
    max_retries: 2
    # cooldown_sec: リトライ間のクールダウン時間 (秒)
    # type: int | default: 0 | range: >= 0
    cooldown_sec: 30

# --- Queue ---
# キュー優先度エージングの設定。
queue:
  # priority_aging_sec: 優先度エージングの間隔 (秒、待機中タスクの優先度を時間経過で引き上げる)
  # type: int | default: 0 | range: >= 0
  priority_aging_sec: 300

# --- Limits ---
# Daemon が強制するリソース制限。
limits:
  # max_pending_commands: 保留中コマンドの最大数
  # type: int | default: 0 | range: 0-1000 (MaxMaxPendingCommands)
  max_pending_commands: 20
  # max_pending_tasks_per_worker: Worker あたりの保留中タスク最大数
  # type: int | default: 0 | range: 0-100 (MaxMaxPendingTasksPerWorker)
  max_pending_tasks_per_worker: 10
  # max_entry_content_bytes: キューエントリ content フィールドの最大バイト数
  # type: int | default: 65536 (DefaultMaxEntryContentBytes=64KB) | range: >= 0
  max_entry_content_bytes: 65536
  # max_yaml_file_bytes: YAML ファイル読み取りの最大バイト数
  # type: int | default: 5242880 (DefaultMaxYAMLFileBytes=5MB) | range: 制限なし
  max_yaml_file_bytes: 5242880
  # max_dead_letter_archive_files: Dead letter アーカイブの最大保持ファイル数
  # type: *int | default: 100 (DefaultMaxDeadLetterArchiveFiles) | range: 0-10000 (MaxMaxDeadLetterArchiveFiles)
  max_dead_letter_archive_files: 100
  # max_quarantine_files: 隔離キューの最大保持ファイル数
  # type: *int | default: 100 (DefaultMaxQuarantineFiles) | range: 0-10000 (MaxMaxQuarantineFiles)
  max_quarantine_files: 100

# shutdown_timeout_sec: Daemon シャットダウンタイムアウト (秒)
# type: int | default: 30 (DefaultShutdownTimeoutSec; 0 指定時は 30 秒にフォールバック) | range: 0-600 (MaxShutdownTimeoutSec)
shutdown_timeout_sec: 90

# --- Logging ---
# ログ出力設定。
logging:
  # level: ログレベル
  # type: string | default: "" | range: 制限なし (例: "debug", "info", "warn", "error")
  level: "info"

# --- Circuit Breaker ---
# コマンドレベルのサーキットブレーカー。連続タスク失敗時にコマンドを自動停止する。
circuit_breaker:
  # enabled: サーキットブレーカーの有効化フラグ (opt-in)
  # type: bool | default: false | range: true/false
  enabled: true
  # max_consecutive_failures: トリップするまでの連続失敗しきい値
  # type: *int | default: 3 (DefaultCBMaxConsecutiveFailures) | range: >= 0
  max_consecutive_failures: 3
  # progress_timeout_minutes: 最後の成功からのタイムアウト (分、0=無効)
  # type: *int | default: 30 (DefaultProgressTimeoutMinutes) | range: >= 0
  progress_timeout_minutes: 30
  # half_open_delay_sec: open→half-open 遷移までの遅延 (秒)
  # type: *int | default: 60 (DefaultCBHalfOpenDelaySec) | range: >= 0
  half_open_delay_sec: 60

# --- Learnings ---
# 学習知見の蓄積機能。
learnings:
  # enabled: 学習知見の蓄積有効化フラグ (opt-in)
  # type: bool | default: false | range: true/false
  enabled: true
  # max_entries: 蓄積する学習知見の上限件数
  # type: *int | default: 100 (DefaultLearningsMaxEntries) | range: >= 0
  max_entries: 100
  # max_content_length: 1件あたりの学習知見の最大文字数
  # type: *int | default: 500 (DefaultLearningsMaxContentLength) | range: >= 0
  max_content_length: 500
  # inject_count: タスク配信時に注入する最新 top-K 件数
  # type: *int | default: 5 (DefaultLearningsInjectCount) | range: >= 0
  inject_count: 5
  # ttl_hours: 学習知見の有効期限 (時間、0=無制限)
  # type: int | default: 0 (EffectiveTTLHours はそのまま返却) | range: 制限なし
  ttl_hours: 72

# --- Worktree ---
# Worker worktree 隔離の設定。
worktree:
  # enabled: Worker worktree 隔離の有効化フラグ
  # type: bool | default: false | range: true/false
  enabled: true
  # base_branch: worktree のベースブランチ / ベース committish
  # setup 時に対象リポジトリの現在の HEAD を自動検出して上書きする:
  #   - ブランチ上なら そのブランチ名 (例: main)
  #   - detached HEAD (commit 固定の submodule 等) なら その commit SHA
  # 非 git ディレクトリの場合はこの既定値 ("main") が残る。
  # type: string | default: 対象の現在 HEAD (fallback "main") | range: 制限なし
  base_branch: "main"
  # path_prefix: worktree 作成先ディレクトリプレフィックス
  # type: string | default: ".maestro/worktrees" (DefaultPathPrefix) | range: 制限なし
  path_prefix: ".maestro/worktrees"
  # auto_commit: Phase 完了時の自動コミット
  # type: bool | default: false | range: true/false
  auto_commit: true
  # auto_merge: Phase 境界での自動マージ
  # type: bool | default: false | range: true/false
  auto_merge: true
  # merge_strategy: git merge 戦略
  # type: string | default: "ort" (DefaultMergeStrategy) | range: "ort", "ours", "theirs", "recursive"
  merge_strategy: "ort"
  # cleanup_on_success: コマンド成功時の worktree 自動クリーンアップ
  # type: bool | default: false | range: true/false
  cleanup_on_success: true
  # cleanup_on_failure: コマンド失敗時の worktree クリーンアップ (false=保全)
  # type: bool | default: false | range: true/false
  cleanup_on_failure: false
  # git_timeout_sec: git コマンドのタイムアウト (秒)
  # type: *int | default: 120 (DefaultGitTimeoutSec) | range: > 0
  git_timeout_sec: 120
  # stall_timeout_minutes: 全タスク terminal & integration 停滞時の planner 通知までの分数 (0=無効)
  # type: *int | default: 30 (DefaultStallTimeoutMinutes) | range: 制限なし
  stall_timeout_minutes: 30
  # fallback_merge_timeout_minutes: auto_commit/auto_merge 無効時に未マージ警告を出すまでの分数 (0=無効)
  # type: *int | default: 60 (DefaultFallbackMergeTimeoutMinutes) | range: 制限なし
  fallback_merge_timeout_minutes: 60
  # stall_cleanup_after: 全タスク terminal だが phase が非 terminal のまま停滞時の fast-track cleanup 発火までの時間
  # type: string (duration) | default: "10m" (DefaultStallCleanupAfter) | range: time.ParseDuration 互換, "0s"=無効
  stall_cleanup_after: "10m"
  # (Removed) commit_policy: max_files / require_gitignore / message_pattern
  # gates predated the orchestrator's "commit Worker output verbatim" model
  # and the runtime no longer reads them. Any prior `commit_policy:` block
  # in user configs is silently ignored.
  gc:
    # enabled: 定期 GC の有効化
    # type: bool | default: false | range: true/false
    enabled: true
    # ttl_hours: 古い worktree の TTL (時間)
    # type: *int | default: 24 (DefaultGCTTLHours) | range: > 0 (enabled 時)
    ttl_hours: 24
    # max_worktrees: 最大 worktree 数
    # type: *int | default: 32 (DefaultGCMaxWorktrees) | range: 1-256 (MaxMaxWorktrees, enabled 時)
    max_worktrees: 32

# --- Skills ---
# スキル参照機能の設定。
skills:
  # enabled: スキル参照機能の有効化フラグ (opt-in)
  # type: bool | default: false | range: true/false
  enabled: true
  # max_refs_per_task: タスクあたりの最大スキル参照数 (role スキルのみカウント)
  # type: *int | default: 3 (DefaultMaxRefsPerTask) | range: >= 0
  max_refs_per_task: 3
  # max_body_chars: スキル本文の最大文字数 (0=無制限)
  # type: *int | default: 0 (EffectiveMaxBodyChars) | range: >= 0
  max_body_chars: 0
  # missing_ref_policy: 参照先スキルが見つからない場合の動作
  # type: string | default: "warn" (DefaultMissingRefPolicy) | range: "warn" or "error"
  missing_ref_policy: "warn"
  # extra_dirs: 追加の skill 探索ディレクトリ (project root からの相対パス or 絶対パス)
  # 各ディレクトリは .maestro/skills と同じ <role>/<name>/SKILL.md 構造を持つ。
  # .maestro/skills が gitignore され setup/repair で上書きされるのに対し、
  # extra_dirs は repo にコミットしてチームで共有・レビューできる (例: .maestro-skills/)。
  # precedence: extra_dirs はリスト順で先勝ちし、いずれも bundled (.maestro/skills) より優先。
  # 同名 skill の衝突は WARN ログで検出される (silent 上書きなし)。
  # 存在しないディレクトリは WARN + skip (daemon は停止しない)。
  # type: []string | default: [] (追加探索なし)
  # extra_dirs:
  #   - ".maestro-skills"
  extra_dirs: []
  auto_collect:
    # enabled: 学習知見からの自動スキル収集 (opt-in)
    # type: bool | default: false | range: true/false
    enabled: false

# --- Quality Gates ---
quality_gates:
  # enabled: 品質ゲートの有効化フラグ
  # type: bool | default: false | range: true/false
  enabled: false
  # skip_gates: 緊急モード (--skip-gates フラグで有効化)
  # type: bool | default: false | range: true/false
  skip_gates: false
  thresholds: {}
  enforcement:
    # pre_task_check: タスク実行前のチェック
    # type: bool | default: false | range: true/false
    pre_task_check: true
    # failure_action: 失敗時の動作
    # type: string | default: "" | range: "warn" or "block"
    failure_action: "warn"

# --- Verify Daemon ---
# Daemon 所有の検証ランナーと verify_pending stall 復旧。
#
# `enabled: true` にした場合、`maestro plan submit` はコマンド毎に
# `.maestro/verify.yaml` ベースのスナップショットを必須とする (build /
# lint / test / typecheck などの検証コマンド一覧)。これはソフトウェア開発
# プロジェクトでは有用だが、研究・ドキュメント・ノート系のリポジトリでは
# 不要なため、テンプレートのデフォルトは `false` にしている。検証カテゴリを
# 使いたい場合のみ true にし、`maestro verify write` で snapshot を書く。
verify:
  # enabled: 実検証ランナーの有効化。
  # type: *bool | default: false | range: true/false
  enabled: false
  # stall_threshold_sec: verify_pending の stall を repair_pending に復旧する秒数。0 は復旧無効。
  # type: *int | default: 600 (DefaultVerifyStallThresholdSec) | range: >= 0
  stall_threshold_sec: 600

# --- Admission Control ---
# verify/repair フェーズの同時実行数制限。
# admission.NewController() が起動時に EffectiveMaxConcurrent* を読み出して
# slot 制御を駆動する (daemon_startup.go)。値はそれぞれの default と同等で、
# 必要に応じて増減する。0 を設定すると無制限になる。
admission_control:
  # max_concurrent_verify: 検証フェーズの最大同時実行数
  # type: int | default: 2 (DefaultMaxConcurrentVerify) | range: >= 0
  max_concurrent_verify: 2
  # max_concurrent_repair: 修復フェーズの最大同時実行数
  # type: int | default: 1 (DefaultMaxConcurrentRepair) | range: >= 0
  max_concurrent_repair: 1

# (Removed) fallback: degraded-mode worker blacklisting was retired —
# blacklisting a worker on consecutive failures created a deadlock where
# the same worker could never reach `healthy` because its dispatch was
# suppressed. Autonomous LLM Orchestration recovers via per-task retry,
# repair tasks, dead-letter, and the circuit_breaker progress_timeout;
# whole-worker silencing is incompatible with that model. The Fallback
# struct is kept for YAML backward compat but the daemon no longer reads
# it, so any prior `fallback:` block in user configs is silently ignored.

# --- Review ---
# 非同期ヘテロジニアスモデルによるコードレビュー。
# enabled: true にすると newReviewCoordinator() が起動し、対象タスクのレビューを
# dispatch する (daemon_startup.go: review_coordinator.go)。利用するモデルを
# models に並べる必要がある (空のままでは review が走らない)。
#
# 注意 (現状の配線): レビュー結果 (findings) は
# `.maestro/state/reviews/<task_id>.yaml` に監査ログとして保存されるのみで、
# Planner / Worker の判断に自動反映する経路は未実装。advisory 用途と考えること。
#
# コードレビューは典型的なソフトウェア開発ワークフローを想定した機能で、
# 研究・ドキュメント系のリポジトリでは出力が雑音になりやすいため、テンプレートの
# デフォルトは `false`。ソフトウェア開発でレビューを回したい場合のみ true にする。
review:
  # enabled: レビュー機能の有効化フラグ (opt-in)
  # type: bool | default: false | range: true/false
  enabled: false
  # models: レビューに使用するモデルリスト (例: ["sonnet"], ["opus"])
  # type: []string | default: [] | range: 制限なし
  models: ["codex"]
  # min_bloom_level: レビュー対象の最小 Bloom レベル (これ未満はスキップ)
  # type: *int | default: 2 (DefaultReviewMinBloomLevel) | range: >= 0
  min_bloom_level: 2
  # max_concurrent_reviews: 最大同時レビュー数
  # type: *int | default: 2 (DefaultReviewMaxConcurrentReviews) | range: >= 0
  max_concurrent_reviews: 2
  # timeout_sec: レビュータイムアウト (秒)
  # type: *int | default: 300 (DefaultReviewTimeoutSec) | range: >= 0
  timeout_sec: 300

# --- Evolution ---
# 進化的品質改善機能。
# 注意 (現状テレメトリのみ): 選択されうる変異戦略のログ出力のみで、Worker への
# 変異指示の実適用・生存選択 (SelectSurvivors) は未配線。enabled にしても
# タスクの実行結果は変わらない (docs/requirements/11-future-extensions.md 参照)。
evolution:
  # enabled: 進化機能の有効化フラグ (opt-in)
  # type: *bool | default: false | range: true/false
  enabled: false
  # max_mutations_per_round: 1ラウンドあたりの最大変異数
  # type: *int | default: 3 (DefaultMaxMutationsPerRound) | range: 制限なし
  max_mutations_per_round: 3
  # novelty_threshold: 新規性しきい値
  # type: *float64 | default: 0.99 (DefaultNoveltyThreshold) | range: 制限なし
  novelty_threshold: 0.99
  # strategies: 使用する戦略リスト
  # type: []string | default: ["diff", "full", "cross"] | range: 制限なし
  strategies: ["diff", "full", "cross"]

# --- Bandit (Adaptive Model Selection) ---
# UCB1 ベースの適応的モデル選択機能。arm はモデルファミリ (sonnet/opus/haiku)
# 単位で管理され、統計は .maestro/state/bandit_state.json に永続化されて
# warm-up (trace_data_requirement + min_samples_before_use) が daemon 再起動を
# またぐ。warm-up 未達では静的な BloomLevel→model マッピングにフォールバック
# する。feature_profiles の adaptive_model_selection が複雑度レベル単位で
# 選択を gate する (off のレベルは静的マッピング、報酬の学習は継続)。
bandit:
  # enabled: バンディット機能の有効化フラグ (opt-in)
  # type: *bool | default: false | range: true/false
  enabled: false
  # exploration_coefficient: 探索係数 (UCB1)
  # type: *float64 | default: 1.41 (DefaultExplorationCoeff) | range: 制限なし
  exploration_coefficient: 1.41
  # min_samples_before_use: 使用開始前の最小サンプル数
  # type: *int | default: 10 (DefaultMinSamplesBeforeUse) | range: 制限なし
  min_samples_before_use: 10
  # trace_data_requirement: トレースデータ要件
  # type: *int | default: 50 (DefaultTraceDataRequirement) | range: 制限なし
  trace_data_requirement: 50

# --- A/B Candidate Selection ---
# クロスランタイム A/B 候補選抜 (実験的機能)。同一タスクを claude-code /
# codex の Worker に並列発注し、検証パイプラインで勝者を選抜する。
# 詳細: docs/design/ab_candidate_selection.md
ab_test:
  # enabled: A/B 候補選抜を有効化
  # type: *bool | default: false | range: true/false
  enabled: false
  # min_bloom_level: A/B を発火させる最小 bloom_level
  # type: *int | default: 4 (DefaultABMinBloomLevel) | range: 1-6
  min_bloom_level: 4
  # timeout_sec: レース全体の上限秒数 (グループ作成起点)。超過時、未着手の
  # 候補は取消され完走済みの候補が不戦勝になる (実行中の候補は自身の
  # DOA/lease に委ねる)。0 = タスクの definition_of_abort.max_wall_clock_sec に従う
  # type: *int | default: 0 | range: >= 0
  timeout_sec: 0
  # selection_timeout_sec: 選抜 (selecting) が integration busy や commit
  # 失敗で収束しない場合に不戦勝 / repair 縮退エスケープを発火させる上限秒数
  # type: *int | default: 1800 (DefaultABSelectionTimeoutSec) | range: >= 0
  selection_timeout_sec: 1800
  # cross_test_patterns: クロステスト行列のテストファイル判定 (basename glob) を
  # 既定 (*_test.go / test_*.py / *_test.py / *.test.* / *.spec.* / *_spec.rb) に追加
  # type: []string | default: [] | '/' を含む glob は不可
  cross_test_patterns: []
  # judge_models: Stage 3 (完全同点の最終決勝) のクロス LLM judge。
  # 未設定 = 既定の固定ペア ["claude-sonnet-4-6", "codex"]。明示的な空リストで
  # Stage 3 無効。1 件のみは不可 (2 票の一致/不一致プロトコルのため)
  # type: []string | default: 未設定 (既定ペア) | range: 0 または 2 件以上
  # judge_models: ["claude-sonnet-4-6", "codex"]

# --- Extended Verification ---
# 拡張検証 (verify.yaml ベース)。
#
# 2026-04-30 redesign: 言語自動判定 / `npm audit` / `pip-audit` / `gosec` 等
# の daemon 側からの自動投入や、`perspective_weights` による
# critical/advisory 切り分けは廃止しました。マエストロは autonomous LLM
# orchestration のハーネスとして、polyglot リポジトリ・研究/ドキュメント用途・
# ソフトウェア開発以外の文脈でも動くことを前提にしているため、特定言語の
# ツール群をデーモン側で勝手に走らせることは設計から外しました。
#
# 検証コマンドは `.maestro/verify.yaml` (build / lint / test / typecheck /
# security / performance) に運用者または Planner が明示的に書く形に統一されて
# おり、書かれたカテゴリだけが critical (weight 1.0) として実行されます。
# 本セクションは EnsembleVerifier の起動可否と自動リトライ回数のみ制御します。
#
# 注意 (現状実質不活性): EnsembleVerifier は verify runner に接続されるものの、
# perspective を投入する production 経路が存在せず常に空。そのため enabled に
# しても verify.yaml のカテゴリが従来どおり critical として実行されるだけで、
# 重み付き集約は発生しない。max_auto_retries も現状は起動ログに出るのみ。
extended_verification:
  # enabled: 拡張検証の有効化フラグ (opt-in)。`verify.enabled` と連動して
  # 動作する。研究/ドキュメント系プロジェクトでは不要なため default false。
  # type: *bool | default: false | range: true/false
  enabled: false
  # max_auto_retries: verify 実行中の自動リトライ予算。失敗した verify
  # コマンドは、その失敗 fingerprint が同一 run 内で初見の場合に限り 1 回
  # 再実行される (決定的な失敗は同じ fingerprint になるため再試行されず、
  # 一過性の flake だけを吸収する)。0 でリトライ無効。
  # type: *int | default: 2 (DefaultMaxAutoRetries) | range: >= 0
  max_auto_retries: 2
  # perspective_weights: verify.yaml カテゴリ名 (build/lint/typecheck/test/
  # security/performance) → 重み。1.0 以上 (または未指定) は critical
  # (失敗で run が fail、デフォルト)。0 < weight < 1.0 は advisory (失敗は
  # 記録・スコア低下のみで run は fail しない)。0 以下は無視される。
  # type: map[string]float64 | default: {} (全カテゴリ critical)
  # perspective_weights:
  #   security: 0.5
  #   performance: 0.5

# --- Search ---
# 探索ベース最適化 (Alpha-Beta, Thompson Sampling)。
# 注意 (現状テレメトリのみ): UCT / Thompson の計算は報酬蓄積・ログに使われる
# だけで実 dispatch を駆動しない (worker 割当は dispatch 前に確定する)。
# 例外として A/B 選抜の機械的 Tie 解消 (C-4-4) のみ稼働
# (docs/requirements/11-future-extensions.md 参照)。
search:
  # enabled: 探索機能の有効化フラグ (opt-in)
  # type: *bool | default: false | range: true/false
  enabled: false
  # max_depth: 探索の最大深さ
  # type: *int | default: 3 (DefaultSearchMaxDepth) | range: 制限なし
  max_depth: 3
  # max_branching: 最大分岐数
  # type: *int | default: 4 (DefaultMaxBranching) | range: 制限なし
  max_branching: 4
  # prune_threshold: 枝刈りしきい値
  # type: *float64 | default: 0.3 (DefaultPruneThreshold) | range: 制限なし
  prune_threshold: 0.3
  # thompson_alpha: Thompson Sampling の alpha パラメータ
  # type: *float64 | default: 1.0 (DefaultThompsonAlpha) | range: 制限なし
  thompson_alpha: 1.0
  # thompson_beta: Thompson Sampling の beta パラメータ
  # type: *float64 | default: 1.0 (DefaultThompsonBeta) | range: 制限なし
  thompson_beta: 1.0

# --- Self-Improvement ---
# プロンプト・ペルソナの自己改善機能。
# 注意 (現状書き込み専用): enabled にすると失敗結果からエラー Fingerprint DB
# (state/fingerprint_db.json) への記録・永続化が行われるが、記録を参照して
# リトライ戦略やプロンプトを変える経路 (Query / SuggestStrategy) に production
# 呼び出しが無く、学習ループは閉じていない。targets / exclude_targets も
# 現状は起動ログに出力されるのみ。
self_improvement:
  # enabled: 自己改善機能の有効化フラグ (opt-in)
  # type: *bool | default: false | range: true/false
  enabled: false
  # targets: 改善対象リスト
  # type: []string | default: ["planner_prompt", "persona", "worker_prompt"] | range: 制限なし
  targets: ["planner_prompt", "persona", "worker_prompt"]
  # exclude_targets: 改善対象から除外するリスト
  # type: []string | default: ["fitness", "daemon_logic", "circuit_breaker"] | range: 制限なし
  exclude_targets: ["fitness", "daemon_logic", "circuit_breaker"]
  # archive_max_size: アーカイブの最大サイズ
  # type: *int | default: 100 (DefaultArchiveMaxSize) | range: 制限なし
  archive_max_size: 100

# --- Complexity ---
# 適応的計算深度制御。
# 注意 (現状テレメトリのみ): dispatch 時にタスクの複雑度レベルを機械算出して
# ログ・queue エントリに記録するが、算出結果はサブタスク分解深度にも機能
# on/off にも接続されていない。enabled にしても実行挙動は変わらない。
complexity:
  # enabled: 複雑度適応の有効化フラグ (opt-in)
  # type: *bool | default: false | range: true/false
  enabled: false
  thresholds:
    # simple_max_files: "simple" 判定の最大ファイル数
    # type: *int | default: 3 (DefaultSimpleMaxFiles) | range: 制限なし
    simple_max_files: 3
    # standard_max_files: "standard" 判定の最大ファイル数
    # type: *int | default: 10 (DefaultStandardMaxFiles) | range: 制限なし
    standard_max_files: 10
    # complex_max_files: "complex" 判定の最大ファイル数
    # type: *int | default: 30 (DefaultComplexMaxFiles) | range: 制限なし
    complex_max_files: 30

# --- Feature Profiles ---
# 複雑度レベル別の機能フラグプロファイル (キー名がプロファイル識別子)。
# 値は SSOT である daemon/featuregate.Evaluator.DefaultProfiles を反映した
# 既定値。空 ({}) にすると daemon は Evaluator の内蔵デフォルトプロファイル
# を使用する。
# 標準キー: simple / standard / complex / critical
#
# 注意 (実ゲーティングの範囲): 現時点で実ゲーティングに接続されているのは
# adaptive_model_selection のみ (Bloom レベルから導出した複雑度レベル単位で
# バンディット選択を on/off。off のレベルは静的マッピング、報酬の学習は継続)。
# その他のキー (cross_agent_review 等) はテレメトリのみで、各機能の発火は
# 上記のグローバル enabled フラグでのみ決まる (REQUIREMENTS.md §5 C-8 参照)。
feature_profiles:
  simple:
    # cross_agent_review: クロスエージェントレビューの有効化
    # type: *bool | default: false (DefaultCrossAgentReview) | range: true/false
    cross_agent_review: false
    # exploratory_optimization: 探索的最適化の有効化
    # type: *bool | default: false | range: true/false
    exploratory_optimization: false
    # evolutionary_quality: 進化的品質改善の有効化
    # type: *bool | default: false | range: true/false
    evolutionary_quality: false
    # adaptive_model_selection: 適応的モデル選択の有効化
    # type: *bool | default: false | range: true/false
    adaptive_model_selection: false
    # self_improvement: 自己改善の有効化
    # type: *bool | default: false | range: true/false
    self_improvement: false
    # adaptive_depth: 適応的深度制御の有効化
    # type: *bool | default: false | range: true/false
    adaptive_depth: false
  standard:
    cross_agent_review: false
    exploratory_optimization: false
    evolutionary_quality: false
    adaptive_model_selection: true
    self_improvement: false
    adaptive_depth: false
  complex:
    cross_agent_review: true
    exploratory_optimization: false
    evolutionary_quality: false
    adaptive_model_selection: true
    self_improvement: false
    adaptive_depth: true
  critical:
    cross_agent_review: true
    exploratory_optimization: true
    evolutionary_quality: true
    adaptive_model_selection: true
    self_improvement: true
    adaptive_depth: true
